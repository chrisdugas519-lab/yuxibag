<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手工包審美 · yuxi.bag</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #F5F0EB;
      --warm-white: #FDFBF9;
      --tan: #C4A882;
      --brown: #8B6914;
      --dark-brown: #3D2B1F;
      --charcoal: #2C2C2A;
      --line-green: #06C755;
      --line-dark: #00B049;
      --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      --shadow: 0 8px 32px rgba(61, 43, 31, 0.08);
      --shadow-hover: 0 12px 40px rgba(61, 43, 31, 0.15);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--warm-white);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      position: relative;
      padding: 48px 32px 32px;
      text-align: center;
      background: linear-gradient(180deg, var(--warm-white) 0%, #F8F4EF 100%);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--tan), var(--brown));
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--warm-white);
      box-shadow: 0 4px 16px rgba(139, 105, 20, 0.25);
      letter-spacing: 2px;
    }

    .brand-name {
      font-family: 'Noto Serif TC', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--dark-brown);
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .brand-handle {
      font-size: 14px;
      color: var(--tan);
      font-weight: 500;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 14px;
      color: #8C7B6B;
      line-height: 1.8;
      max-width: 280px;
      margin: 0 auto;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--tan);
      margin: 20px auto;
      border-radius: 1px;
    }

    .content {
      padding: 0 28px 32px;
    }

    .section-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--brown);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: 3px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      border: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-bottom: 12px;
    }

    .btn-line {
      background: var(--line-green);
      color: white;
      box-shadow: 0 4px 16px rgba(6, 199, 85, 0.25);
    }

    .btn-line:hover {
      background: var(--line-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(6, 199, 85, 0.35);
    }

    .btn-ig {
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: white;
      box-shadow: 0 4px 16px rgba(220, 39, 67, 0.2);
    }

    .btn-ig:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(220, 39, 67, 0.3);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .info-box {
      background: #F8F4EF;
      border-radius: 14px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(196, 168, 130, 0.2);
    }

    .info-box h3 {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--dark-brown);
      margin-bottom: 12px;
      text-align: center;
    }

    .info-box p {
      font-size: 13px;
      color: #6B5D4F;
      line-height: 1.9;
      text-align: center;
    }

    .info-box .highlight {
      color: var(--brown);
      font-weight: 500;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .gallery-item {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #EDE8E2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #B0A090;
      text-align: center;
      padding: 8px;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #C4B8A8;
      border-top: 1px solid rgba(196, 168, 130, 0.15);
    }

    .footer span {
      font-family: 'Noto Serif TC', serif;
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 20px;
      }
      .hero {
        padding: 40px 24px 28px;
      }
      .content {
        padding: 0 20px 28px;
      }
    }
  </style>
</head>
